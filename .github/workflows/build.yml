name: Build win exe

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Python installation
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install prerequisites
      run: |
        pip install -r requirements.txt

    - name: Build exe
      run: |
        pyinstaller --onefile --noconsole --name Space_Delivery_1.0.0-alpha1 --add-data "assets;assets" main.py

    - name: Upload exe
      uses: actions/upload-artifact@v4
      with:
        name: MyGame-alpha1
        path: dist/MyGame-alpha1.exe
